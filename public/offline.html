<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <title>Hors ligne - Pokemon Marketplace</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        display: grid;
        min-height: 100dvh;
        place-items: center;
        background: #f8fafc;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 420px);
        border: 1px solid #e2e8f0;
        background: #fff;
        border-radius: 16px;
        padding: 20px;
      }
      h1 { margin: 0 0 8px; font-size: 20px; }
      p { margin: 0 0 14px; color: #475569; line-height: 1.45; }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        background: #4f46e5;
        color: #fff;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <article class="card">
      <h1>Vous etes hors ligne</h1>
      <p>
        Verifiez votre connexion puis reessayez. Les derniere pages visitees
        resteront disponibles des que possible.
      </p>
      <button onclick="window.location.reload()">Recharger</button>
    </article>
  </body>
</html>
